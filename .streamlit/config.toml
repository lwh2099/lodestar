[theme]
primaryColor = "#D97757"
backgroundColor = "#FAF9F5"
secondaryBackgroundColor = "#F0EEE6"
textColor = "#1F1E1D"
font = "sans serif"

[browser]
gatherUsageStats = false

[server]
headless = false
# Serve ./static/ at /app/static/ — used to load plotly.js inside the
# custom chart component (ui/charts.py) without a CDN round-trip.
enableStaticServing = true
